<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasiOffice</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <!-- Vendored locally so the app works on an isolated/offline LAN (no CDN dependency) -->
    <!-- Tailwind CSS -->
    <script src="/static/vendor/tailwindcss.js"></script>
    <link href="/static/styles.css" rel="stylesheet">
    <!-- Vue.js (production build) -->
    <script src="/static/vendor/vue.global.prod.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary, #1E3A8A)',
                        'primary-hover': 'var(--color-primary-hover, #1D4ED8)',
                        'primary-light': 'var(--color-primary-light, #EFF6FF)',
                        accent: 'var(--color-accent, #3B82F6)',
                        'accent-hover': 'var(--color-accent-hover, #2563EB)',
                        'accent-light': 'var(--color-accent-light, #EFF6FF)',
                        goingon: 'var(--color-goingon, #3B82F6)',
                        completed: 'var(--color-completed, #10B981)',
                        stuck: 'var(--color-stuck, #EF4444)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased">
    <div id="app" class="flex h-screen overflow-hidden" v-cloak @click="showPaletteDropdown = false">
        
        <!-- 1. LOGIN OVERLAY SCREEN -->
        <div v-if="!isLoggedIn" class="min-h-screen w-full flex items-center justify-center p-4 z-50" style="background: linear-gradient(160deg, #f7f7f7 0%, #efefef 50%, #e7e7e7 100%);">
            <!-- Clean Apple-style Login Card -->
            <div class="w-full max-w-sm rounded-3xl border border-black/5 p-9 flex flex-col animate-fade-in" style="background:#ffffff; box-shadow: 0 24px 64px rgba(0,0,0,0.12);">
                <div class="flex flex-col items-center mb-8">
                    <img src="/static/logo.png" alt="EasiOffice" class="app-logo w-20 h-20 mb-4 drop-shadow-lg rounded-full" style="object-fit:cover;">
                    <h1 class="text-[26px] font-semibold tracking-tight text-gray-900">EasiOffice</h1>
                    <p class="text-[14px] text-gray-400 mt-1">Office Management for CA Firms</p>
                </div>

                <form @submit.prevent="handleLogin" class="space-y-4">
                    <div>
                        <label class="block text-[13px] font-semibold text-gray-600 mb-1.5">Username</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                            <input v-model="loginForm.username" type="text" placeholder="Enter username" required class="pl-11 pr-4 py-3 w-full text-[15px] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-gray-800 placeholder-gray-400" style="background:#f5f5f7;">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[13px] font-semibold text-gray-600 mb-1.5">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                            <input v-model="loginForm.password" type="password" placeholder="Enter password" required class="pl-11 pr-4 py-3 w-full text-[15px] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-gray-800 placeholder-gray-400" style="background:#f5f5f7;">
                        </div>
                    </div>

                    <div v-if="loginError" class="p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-[13px] flex items-center gap-2">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span>{{ loginError }}</span>
                    </div>

                    <button type="submit" class="w-full text-white font-semibold py-3.5 px-4 rounded-xl text-[15px] transition flex items-center justify-center gap-2 mt-2 hover:opacity-95 shadow-lg" style="background: var(--color-primary);">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                    </button>
                </form>
            </div>
        </div>

        <!-- 2. MAIN APPLICATION WORKSPACE -->
        <template v-else>
            <!-- macOS-style Collapsible Sidebar -->
            <aside class="app-sidebar flex flex-col z-20 transition-all duration-300 ease-in-out shrink-0"
                   :class="isSidebarCollapsed ? 'collapsed w-[3.5rem]' : 'w-[11rem]'">
                <div class="h-14 flex items-center px-3 transition-all"
                     :class="isSidebarCollapsed ? 'justify-center' : 'justify-start gap-2'">
                    <img src="/static/logo.png" alt="EasiOffice" class="app-logo w-7 h-7 shrink-0 rounded-full" style="object-fit:cover;">
                    <h1 v-show="!isSidebarCollapsed" class="brand-title text-[14px] font-semibold tracking-tight truncate">EasiOffice</h1>
                </div>
                <nav class="flex-1 px-2 py-2 space-y-0.5 overflow-y-auto overflow-x-hidden">
                    <a href="#" @click="currentTab = 'dashboard'" class="nav-link" :class="{ active: currentTab === 'dashboard' }" :title="isSidebarCollapsed ? 'Dashboard' : ''">
                        <i class="fa-solid fa-gauge-high"></i>
                        <span v-show="!isSidebarCollapsed">Dashboard</span>
                    </a>
                    <a href="#" @click="currentTab = 'tasks'" class="nav-link" :class="{ active: currentTab === 'tasks' }" :title="isSidebarCollapsed ? 'Tasks' : ''">
                        <i class="fa-solid fa-list-check"></i>
                        <span v-show="!isSidebarCollapsed">Tasks</span>
                    </a>
                    <a href="#" @click="currentTab = 'clients'" class="nav-link" :class="{ active: currentTab === 'clients' }" :title="isSidebarCollapsed ? 'Clients' : ''">
                        <i class="fa-solid fa-user-group"></i>
                        <span v-show="!isSidebarCollapsed">Clients</span>
                    </a>
                    <a href="#" @click="currentTab = 'services'" class="nav-link" :class="{ active: currentTab === 'services' }" :title="isSidebarCollapsed ? 'Services' : ''">
                        <i class="fa-solid fa-layer-group"></i>
                        <span v-show="!isSidebarCollapsed">Services</span>
                    </a>
                    <a href="#" v-if="can('manage_users')" @click="currentTab = 'users'" class="nav-link" :class="{ active: currentTab === 'users' }" :title="isSidebarCollapsed ? 'Users' : ''">
                        <i class="fa-solid fa-user-shield"></i>
                        <span v-show="!isSidebarCollapsed">Users</span>
                    </a>
                    <a href="#" @click="currentTab = 'timesheet'" class="nav-link" :class="{ active: currentTab === 'timesheet' }" :title="isSidebarCollapsed ? 'Time Sheet' : ''">
                        <i class="fa-regular fa-clock"></i>
                        <span v-show="!isSidebarCollapsed">Time Sheet</span>
                    </a>
                    <a href="#" v-if="can('manage_billing')" @click="currentTab = 'billed'" class="nav-link" :class="{ active: currentTab === 'billed' }" :title="isSidebarCollapsed ? 'Billed' : ''">
                        <i class="fa-solid fa-file-invoice-dollar"></i>
                        <span v-show="!isSidebarCollapsed">Billed</span>
                        <span v-show="!isSidebarCollapsed && billedTasks.length" class="ml-auto text-[11px] font-semibold bg-black/10 rounded-full px-2 py-0.5">{{ billedTasks.length }}</span>
                    </a>
                    <a href="#" v-if="can('manage_billing')" @click="currentTab = 'received'" class="nav-link" :class="{ active: currentTab === 'received' }" :title="isSidebarCollapsed ? 'Received Fees' : ''">
                        <i class="fa-solid fa-circle-check"></i>
                        <span v-show="!isSidebarCollapsed">Received Fees</span>
                        <span v-show="!isSidebarCollapsed && receivedTasks.length" class="ml-auto text-[11px] font-semibold bg-black/10 rounded-full px-2 py-0.5">{{ receivedTasks.length }}</span>
                    </a>
                    <a href="#" @click="currentTab = 'reports'" class="nav-link" :class="{ active: currentTab === 'reports' }" :title="isSidebarCollapsed ? 'Reports' : ''">
                        <i class="fa-solid fa-chart-line"></i>
                        <span v-show="!isSidebarCollapsed">Reports</span>
                    </a>
                    <a href="#" @click="currentTab = 'activity'" class="nav-link" :class="{ active: currentTab === 'activity' }" :title="isSidebarCollapsed ? 'Activity Log' : ''">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span v-show="!isSidebarCollapsed">Activity Log</span>
                    </a>
                </nav>
                <div class="p-2 border-t border-white/10 flex flex-col gap-2">
                    <button v-show="!isSidebarCollapsed" @click="openProfileModal"
                            class="flex flex-col gap-0.5 px-1.5 py-1 rounded-lg text-left animate-fade-in transition"
                            style="color:#ffffff;"
                            onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'"
                            :title="'Profile · change password'">
                        <span class="text-[12px] font-semibold truncate">{{ currentUser.full_name }}</span>
                        <span class="text-[10px] flex items-center gap-1 font-medium" style="color:#8aaba6;">
                            <i class="fa-solid fa-key text-[9px]"></i> Profile · change password
                        </span>
                    </button>
                    <button v-show="isSidebarCollapsed" @click="openProfileModal" class="w-full py-1.5 rounded-[10px] text-[13px] flex items-center justify-center transition" style="color:#ffffff;" title="Profile · change password"
                        onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='transparent'">
                        <i class="fa-solid fa-user-gear text-[14px]"></i>
                    </button>
                    <button @click="handleLogout" class="w-full py-1.5 rounded-[10px] text-[13px] font-medium transition flex items-center justify-center gap-2" style="color:#f87171;" :title="isSidebarCollapsed ? 'Logout' : ''"
                        onmouseover="this.style.background='rgba(248,113,113,0.12)'" onmouseout="this.style.background='transparent'">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <span v-show="!isSidebarCollapsed">Sign Out</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="flex-1 flex flex-col h-screen overflow-hidden">
                
                <!-- Header -->
                <header class="h-16 bg-white/80 backdrop-blur-xl border-b border-gray-150 flex items-center justify-between px-7 z-10">
                    <div class="flex items-center gap-3">
                        <!-- macOS-style sidebar show/hide toggle -->
                        <button @click="isSidebarCollapsed = !isSidebarCollapsed" class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-500 hover:text-gray-700 transition" title="Show / hide sidebar">
                            <i class="fa-solid fa-table-columns text-[17px]"></i>
                        </button>
                        <h2 class="text-[22px] font-semibold text-gray-800 tracking-tight">{{ tabTitle }}</h2>
                    </div>
                    <div class="flex items-center gap-2.5">
                        <!-- Single-tap Light / Dark mode toggle -->
                        <button @click="toggleDark" :title="isDark ? 'Switch to light mode' : 'Switch to dark mode'" class="flex items-center justify-center w-9 h-9 hover:bg-gray-100 rounded-full text-gray-600 transition">
                            <i class="fa-solid text-[17px]" :class="isDark ? 'fa-sun text-gray-600' : 'fa-moon text-gray-600'"></i>
                        </button>
                        <!-- Theme Swatch Palette Selector -->
                        <div class="relative">
                            <button @click.stop="showPaletteDropdown = !showPaletteDropdown" class="flex items-center gap-2 px-3 py-2 hover:bg-gray-100 rounded-full text-sm font-medium text-gray-600 transition" title="Select Theme Palette">
                                <i class="fa-solid fa-palette text-accent text-[15px]"></i>
                                <span class="hidden sm:inline">Theme</span>
                            </button>
                            <div v-if="showPaletteDropdown" class="absolute right-0 mt-2 w-64 bg-white border border-gray-200 rounded-2xl shadow-xl z-30 py-2 animate-fade-in">
                                <div class="px-4 py-1.5 border-b border-gray-100 text-[11px] font-semibold text-gray-400 uppercase tracking-widest">Color Palette</div>
                                <button v-for="(pal, key) in palettes" :key="key" @click="changePalette(key)" class="w-full text-left px-4 py-3 hover:bg-gray-50 transition flex items-center justify-between group">
                                    <div class="flex flex-col gap-0.5">
                                        <span class="text-[13px] font-semibold text-gray-800 group-hover:text-accent">{{ pal.name }}</span>
                                        <div class="flex items-center gap-1.5 mt-1.5">
                                            <span class="w-4 h-4 rounded-full border border-black/5" :style="{ backgroundColor: pal.primary }"></span>
                                            <span class="w-4 h-4 rounded-full border border-black/5" :style="{ backgroundColor: pal.accent }"></span>
                                            <span class="w-4 h-4 rounded-full border border-black/5" :style="{ backgroundColor: pal.accentLight }"></span>
                                        </div>
                                    </div>
                                    <i v-if="currentPalette === key" class="fa-solid fa-circle-check text-green-500 text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center gap-2.5 pl-2 ml-1 border-l border-gray-200">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-[13px] font-semibold shadow-sm" style="background: linear-gradient(160deg, var(--color-accent), var(--color-primary));">
                                {{ currentUser.full_name ? currentUser.full_name[0] : '?' }}
                            </div>
                            <div class="hidden sm:flex flex-col leading-tight">
                                <span class="text-[13px] font-semibold text-gray-800">{{ currentUser.full_name }}</span>
                                <span class="text-[11px] text-gray-400 font-medium">{{ currentUser.role }}</span>
                            </div>
                        </div>
                    </div>
                </header>

                <!-- Inner Scroll Container -->
                <div class="flex-1 overflow-y-auto bg-gray-50/50">
                    
                    <!-- 1. DASHBOARD TAB — Kanban Board -->
                    <main v-if="currentTab === 'dashboard'" class="p-7 space-y-6 max-w-7xl mx-auto">
                        <!-- Active timer banner + export -->
                        <div class="flex flex-wrap items-center gap-3">
                            <div v-if="activeTimerTask" class="flex items-center gap-3 bg-white app-card px-4 py-2.5">
                                <span class="text-[13px] text-gray-500 font-medium truncate max-w-[260px]"><i class="fa-solid fa-stopwatch text-accent mr-1.5"></i>Timing: {{ activeTimerTask.client_name }} · {{ activeTimerTask.service_name }}</span>
                                <span class="font-mono font-semibold text-gray-800 text-[15px]">{{ activeTimerDisplay }}</span>
                                <button @click="pauseTaskTimer(activeTimerTask)" class="px-3 py-1.5 rounded-lg text-[13px] font-semibold text-white transition" style="background: var(--color-stuck);"><i class="fa-solid fa-pause text-[11px] mr-1"></i> Pause</button>
                            </div>
                            <button v-if="isAdminOrPartner" @click="openExportModal('dashboard')" class="ml-auto px-4 py-2 bg-gray-900 hover:bg-black text-white rounded-xl font-semibold text-sm shadow-sm transition flex items-center gap-1.5 whitespace-nowrap">
                                <i class="fa-solid fa-file-export"></i> Export Full Report
                            </button>
                        </div>

                        <!-- Summary count cards -->
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            <button @click="setDashCard('Unassigned')" class="app-card p-5 text-left rail-unassigned transition" :class="dashCard==='Unassigned' ? 'ring-2 ring-gray-800' : 'hover:shadow-md'">
                                <div class="text-[12px] text-gray-400 font-semibold uppercase tracking-wide">Unassigned</div>
                                <div class="text-4xl font-semibold text-gray-800 mt-1">{{ counts.unassigned }}</div>
                            </button>
                            <button @click="setDashCard('Pending')" class="app-card p-5 text-left rail-pending transition" :class="dashCard==='Pending' ? 'ring-2 ring-gray-800' : 'hover:shadow-md'">
                                <div class="text-[12px] text-gray-400 font-semibold uppercase tracking-wide">Pending</div>
                                <div class="text-4xl font-semibold text-gray-800 mt-1">{{ counts.stuck }}</div>
                            </button>
                            <button @click="setDashCard('Working')" class="app-card p-5 text-left rail-working transition" :class="dashCard==='Working' ? 'ring-2 ring-gray-800' : 'hover:shadow-md'">
                                <div class="text-[12px] text-gray-400 font-semibold uppercase tracking-wide">Working</div>
                                <div class="text-4xl font-semibold text-gray-800 mt-1">{{ counts.goingOn }}</div>
                            </button>
                            <button @click="setDashCard('Completed')" class="app-card p-5 text-left rail-completed transition" :class="dashCard==='Completed' ? 'ring-2 ring-gray-800' : 'hover:shadow-md'">
                                <div class="text-[12px] text-gray-400 font-semibold uppercase tracking-wide">Completed</div>
                                <div class="text-4xl font-semibold text-gray-800 mt-1">{{ counts.completed }}</div>
                            </button>
                        </div>

                        <!-- Team status — who's online / working (hidden for Employees) -->
                        <div v-if="currentUser.role !== 'Employee'" class="app-card p-5">
                            <h3 class="text-[16px] font-semibold text-gray-800 flex items-center gap-2 mb-4"><i class="fa-solid fa-users text-accent"></i> Team status <span class="text-[12px] font-normal text-gray-400">· {{ onlineUsers.length }} online</span></h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2.5">
                                <div v-for="p in presence" :key="p.user_id" class="flex items-center gap-2.5 px-3 py-2 rounded-xl border border-gray-100" :class="p.online ? 'bg-emerald-50/40' : 'bg-gray-50/40'">
                                    <span class="w-2.5 h-2.5 rounded-full shrink-0" :class="p.online ? 'bg-emerald-500' : 'bg-gray-300'"></span>
                                    <div class="min-w-0 flex-1">
                                        <div class="text-[13.5px] font-semibold text-gray-800 truncate">{{ p.full_name }}</div>
                                        <div class="text-[11px] text-gray-400">{{ p.role }}</div>
                                    </div>
                                    <span v-if="p.working" class="pill pill-working text-[11px] shrink-0"><i class="fa-solid fa-stopwatch mr-1"></i>Working</span>
                                    <span v-else-if="p.online" class="text-[11px] text-emerald-600 font-semibold shrink-0">Online</span>
                                    <span v-else class="text-[11px] text-gray-400 shrink-0">Offline</span>
                                </div>
                                <div v-if="!presence.length" class="col-span-full text-center py-6 text-[13px] text-gray-400 italic">No staff yet.</div>
                            </div>
                        </div>

                        <!-- Selected card: tasks grouped by staff -->
                        <div v-if="dashCard" class="app-card p-5 animate-fade-in">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-[16px] font-semibold text-gray-800">{{ dashCard }} tasks — by staff</h3>
                                <button @click="setDashCard(dashCard)" class="text-gray-400 hover:text-gray-700 text-sm"><i class="fa-solid fa-xmark mr-1"></i>Close</button>
                            </div>
                            <div v-if="dashTasksByUser.length" class="space-y-4">
                                <div v-for="grp in dashTasksByUser" :key="grp.name">
                                    <div class="flex items-center gap-2 mb-1.5">
                                        <span class="w-7 h-7 rounded-full bg-accent-light text-accent text-[12px] font-bold flex items-center justify-center uppercase">{{ grp.name[0] }}</span>
                                        <span class="font-semibold text-[14px] text-gray-800">{{ grp.name }}</span>
                                        <span class="text-[12px] text-gray-400">{{ grp.tasks.length }} task{{ grp.tasks.length===1?'':'s' }}</span>
                                    </div>
                                    <div class="pl-9 divide-y divide-gray-50">
                                        <div v-for="t in grp.tasks" :key="t.id" class="flex items-center justify-between gap-3 py-1.5 text-[13.5px]">
                                            <span class="text-gray-700 truncate"><span class="text-gray-400">{{ taskSerial(t) }}</span> · {{ t.client_name }} · {{ t.service_name }} <span class="text-gray-400">({{ t.period }})</span></span>
                                            <span class="font-mono text-gray-400 text-[12.5px] whitespace-nowrap"><i class="fa-regular fa-calendar mr-1"></i>{{ t.due_date || '—' }}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div v-else class="text-[13px] text-gray-400 italic py-6 text-center">No {{ dashCard.toLowerCase() }} tasks.</div>
                        </div>
                        <div v-else class="text-center py-10 text-gray-400 text-[14px]"><i class="fa-regular fa-hand-pointer mr-1.5"></i>Click a card above to see those tasks grouped by staff member.</div>
                    </main>

                    <!-- 2. TASKS TAB -->
                    <main v-if="currentTab === 'tasks'" class="p-6 flex flex-col h-full overflow-hidden">
                        <!-- Task Bar Header -->
                        <div class="flex flex-col md:flex-row gap-3 items-center justify-between bg-white p-4 rounded-2xl border border-gray-150 shadow-sm shrink-0 mb-4">
                            <!-- Search + active timer -->
                            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                <div class="relative w-full sm:w-72">
                                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input v-model="taskSearch" type="text" placeholder="Search tasks by Client/Service..." class="pl-10 pr-4 py-2 w-full text-sm rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                                </div>
                                <div v-if="activeTimerTask" class="hidden lg:flex items-center gap-2 text-[13px] text-gray-500">
                                    <i class="fa-solid fa-stopwatch text-accent"></i><span class="font-mono font-semibold text-gray-800">{{ activeTimerDisplay }}</span>
                                    <button @click="pauseTaskTimer(activeTimerTask)" class="px-2 py-1 rounded-lg text-[12px] font-semibold text-white" style="background: var(--color-stuck);"><i class="fa-solid fa-pause text-[10px] mr-1"></i>Pause</button>
                                </div>
                            </div>
                            
                            <!-- Action Buttons: create client / single task rights conditionally visible to Admin only -->
                            <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                                <button @click="openExportModal('tasks')" class="px-4 py-2 text-sm font-semibold border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl transition flex items-center gap-1.5 shadow-sm">
                                    <i class="fa-solid fa-file-export"></i> Export
                                </button>
                                <button v-if="can('create_task')" @click="openImportModal('tasks')" class="px-4 py-2 text-sm font-semibold border border-gray-300 text-gray-700 hover:bg-gray-100 rounded-xl transition flex items-center gap-1.5 shadow-sm">
                                    <i class="fa-solid fa-file-import"></i> Bulk Upload
                                </button>
                                <button v-if="can('create_task')" @click="openRecurringModal" class="px-4 py-2 text-sm font-semibold border border-gray-300 text-gray-700 hover:bg-gray-100 rounded-xl transition flex items-center gap-1.5 shadow-sm">
                                    <i class="fa-solid fa-repeat"></i> Recurring
                                </button>
                                <button v-if="can('create_task')" @click="showBulkEngine = !showBulkEngine" class="px-4 py-2 text-sm font-semibold border border-primary text-primary hover:bg-blue-50 rounded-xl transition flex items-center gap-1.5 shadow-sm">
                                    <i class="fa-solid fa-bolt"></i> Bulk Engine
                                </button>
                                <button v-if="can('create_task')" @click="showTaskModal = true" class="px-4 py-2 text-sm font-semibold bg-primary hover:bg-primary-hover text-white rounded-xl transition flex items-center gap-1.5 shadow-sm">
                                    <i class="fa-solid fa-plus"></i> Create Task
                                </button>
                            </div>
                        </div>

                        <!-- Collapsible Bulk Engine Panel -->
                        <div v-if="showBulkEngine && can('create_task')" class="bg-gray-900 text-white rounded-2xl shadow-lg p-6 border border-gray-800 relative overflow-hidden transition-all duration-300 shrink-0 mb-4">
                            <div class="relative z-10 max-w-2xl">
                                <h3 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-bolt text-white"></i> Generate Bulk Tasks</h3>
                                <p class="text-gray-300 text-sm mt-1 mb-5">Instantly auto-generate a compliance task for all registered clients using a service template.</p>

                                <form @submit.prevent="generateBulkTasks" class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Service Template</label>
                                        <select v-model="bulkForm.service_id" required class="w-full rounded-xl border-none bg-white/10 p-2.5 text-sm text-white focus:ring-2 focus:ring-white/40">
                                            <option disabled value="">Select a service...</option>
                                            <option v-for="srv in services" :key="srv.id" :value="srv.id">{{ srv.name }}</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Financial Year</label>
                                        <input v-model="bulkForm.financial_year" type="text" placeholder="e.g. 2025-26" required pattern="20[0-9]{2}-[0-9]{2}" title="Financial Year must match format YYYY-YY (e.g. 2025-26)" class="w-full rounded-xl border-none bg-white/10 p-2.5 text-sm text-white focus:ring-2 focus:ring-white/40">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Period / Month</label>
                                        <input v-model="bulkForm.period" type="text" placeholder="e.g. May" required class="w-full rounded-xl border-none bg-white/10 p-2.5 text-sm text-white focus:ring-2 focus:ring-white/40">
                                    </div>
                                    <div class="sm:col-span-3 flex justify-end gap-2 mt-2">
                                        <button type="button" @click="showBulkEngine = false" class="px-4 py-2 text-xs font-bold text-gray-300 hover:text-white transition">Cancel</button>
                                        <button type="submit" class="bg-white hover:bg-gray-200 text-gray-900 font-bold py-2 px-5 rounded-xl text-xs shadow-md transition duration-200">
                                            Generate Active Tasks
                                        </button>
                                    </div>
                                </form>
                                
                                <div v-if="bulkMessage" class="mt-4 p-3 bg-green-500/20 border border-green-500/30 text-green-300 rounded-xl text-xs flex items-center">
                                    <i class="fa-solid fa-circle-check mr-2 text-green-400"></i> {{ bulkMessage }}
                                </div>
                            </div>
                        </div>

                        <!-- Kanban Board (Unassigned · Pending · Working · Completed) -->
                        <div class="flex gap-4 flex-1 min-h-0 overflow-x-auto pb-2">
                            <div v-for="col in boardColumns" :key="col.key"
                                 class="kanban-col flex flex-col flex-1 min-w-[270px]"
                                 :class="{ 'drag-over': dragOverColumn === col.key }"
                                 @dragover.prevent="onColumnDragOver(col.key)"
                                 @dragenter.prevent="onColumnDragOver(col.key)"
                                 @dragleave="onColumnDragLeave(col.key)"
                                 @drop.prevent="onColumnDrop(col.key)">
                                <!-- Column header -->
                                <div class="flex items-center justify-between px-3 pt-3 pb-2 shrink-0">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2.5 h-2.5 rounded-full" :style="{ backgroundColor: col.accent }"></span>
                                        <h3 class="text-[15px] font-semibold text-gray-800">{{ col.label }}</h3>
                                    </div>
                                    <span class="text-[13px] font-semibold text-gray-400 bg-black/5 rounded-full px-2.5 py-0.5">{{ col.tasks.length }}</span>
                                </div>
                                <!-- Column body -->
                                <div class="flex-1 overflow-y-auto px-2.5 pb-2.5 space-y-2.5">
                                    <div v-for="task in col.tasks" :key="task.id"
                                         class="kanban-card p-2.5"
                                         :class="['rail-' + col.key.toLowerCase(), { dragging: draggedTaskId === task.id }]"
                                         draggable="true"
                                         @dragstart="onTaskDragStart(task, $event)"
                                         @dragend="onTaskDragEnd">
                                        <div class="flex items-start justify-between gap-2">
                                            <div class="font-semibold text-[15px] text-gray-800 leading-snug">{{ task.client_name }}</div>
                                            <div class="flex items-center gap-1 shrink-0">
                                                <button v-if="can('create_task')" @click="startEditTask(task)" class="text-gray-400 hover:text-accent hover:bg-accent-light p-1.5 rounded-lg transition" title="Edit task">
                                                    <i class="fa-solid fa-pen text-[12px]"></i>
                                                </button>
                                                <button v-if="can('delete_task')" @click="deleteTask(task)" class="text-gray-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded-lg transition" title="Delete task">
                                                    <i class="fa-solid fa-trash-can text-[12px]"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="mt-1 inline-flex items-center bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-[12.5px] font-medium">
                                            {{ task.service_name }}
                                        </div>
                                        <div class="mt-2 flex items-center justify-between text-[13px] text-gray-500">
                                            <span class="font-medium"><span class="text-gray-400">{{ taskSerial(task) }}</span> · {{ task.period }}</span>
                                            <span class="font-mono whitespace-nowrap"><i class="fa-regular fa-calendar mr-1 text-accent"></i>{{ task.due_date || '—' }}</span>
                                        </div>
                                        <div v-if="task.estimated_minutes" class="text-[12px] text-gray-400 inline-flex items-center gap-1"><i class="fa-regular fa-hourglass-half"></i>Est {{ estDisplay(task.estimated_minutes) }}</div>
                                        <!-- Admin/assigner inline controls -->
                                        <div v-if="can('assign_task')" class="mt-2 flex items-center gap-1.5">
                                            <select v-model="task.assigned_to" @change="assignTask(task, task.assigned_to)" title="Assign" class="flex-1 min-w-0 rounded-lg border border-gray-200 px-2 py-1 text-[12.5px] bg-white cursor-pointer">
                                                <option :value="null">— Unassigned —</option>
                                                <option v-for="u in usersList" :key="u.id" :value="u.id">{{ u.full_name }}</option>
                                            </select>
                                        </div>
                                        <div v-if="can('delegate_task') && task.assigned_to === currentUser.id" class="mt-1.5 flex items-center gap-1.5">
                                            <span class="text-[11px] text-gray-400 shrink-0">Delegate</span>
                                            <select v-model="task.delegated_to" @change="delegateTask(task, task.delegated_to)" class="flex-1 min-w-0 rounded-lg border border-gray-200 px-2 py-1 text-[12.5px] bg-white cursor-pointer">
                                                <option :value="null">— None —</option>
                                                <option v-for="u in usersList.filter(x => x.role === 'Employee')" :key="u.id" :value="u.id">{{ u.full_name }}</option>
                                            </select>
                                        </div>
                                        <div class="mt-2 pt-2 border-t border-gray-100 flex items-center justify-between gap-2">
                                            <span class="text-[12.5px] text-gray-500 inline-flex items-center gap-1.5 truncate">
                                                <i class="fa-solid fa-circle-user text-gray-400"></i>{{ task.assigned_to_name || 'Unassigned' }}<template v-if="task.delegated_to_name"> <i class="fa-solid fa-arrow-right-long text-gray-300 mx-0.5"></i> {{ task.delegated_to_name }}</template>
                                            </span>
                                            <!-- Completed cards: log time + (optionally) bill -->
                                            <div v-if="col.key === 'Completed'" class="flex items-center gap-1 shrink-0">
                                                <button @click="openLogModal(task)" class="px-2.5 py-1.5 rounded-lg text-[12.5px] font-semibold text-gray-600 hover:text-white hover:bg-accent transition inline-flex items-center gap-1.5 border border-gray-200" title="Add to time log">
                                                    <i class="fa-regular fa-clock text-[10px]"></i> Log
                                                </button>
                                                <button v-if="can('manage_billing')" @click="openBillingModal(task)" class="px-2.5 py-1.5 rounded-lg text-[12.5px] font-semibold text-white inline-flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 transition" title="Bill this task">
                                                    <i class="fa-solid fa-file-invoice-dollar text-[10px]"></i> Billed
                                                </button>
                                            </div>
                                            <template v-else-if="task.assigned_to">
                                                <div class="flex items-center gap-1 shrink-0">
                                                    <button v-if="can('reset_timer') && taskHasTime(task.id)" @click="resetTaskTimer(task)" class="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition" title="Reset timer"><i class="fa-solid fa-rotate-left text-[11px]"></i></button>
                                                    <button v-if="!isTaskRunning(task.id)" @click="startTaskTimer(task)" class="px-2.5 py-1.5 rounded-lg text-[12.5px] font-semibold text-gray-600 hover:text-white hover:bg-accent transition inline-flex items-center gap-1.5 border border-gray-200" :title="taskHasTime(task.id) ? 'Resume timer' : 'Start timer'">
                                                        <i class="fa-solid fa-play text-[10px]"></i> <span>{{ taskHasTime(task.id) ? taskTimerDisplay(task.id) : 'Start' }}</span>
                                                    </button>
                                                    <button v-else @click="pauseTaskTimer(task)" class="px-2.5 py-1.5 rounded-lg text-[12.5px] font-semibold text-white inline-flex items-center gap-1.5" style="background: var(--color-stuck);" title="Pause timer">
                                                        <i class="fa-solid fa-pause text-[10px]"></i> {{ taskTimerDisplay(task.id) }}
                                                    </button>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                    <div v-if="col.tasks.length === 0" class="text-center py-10 text-[13px] text-gray-300 select-none">
                                        <i class="fa-regular fa-square-check text-2xl block mb-2 opacity-50"></i>
                                        Drop tasks here
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <!-- 3. CLIENTS TAB — Cards only -->
                    <main v-if="currentTab === 'clients'" class="p-7 space-y-6 max-w-7xl mx-auto">
                        <!-- Header Action Bar -->
                        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div class="relative w-full sm:w-96">
                                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input v-model="clientSearch" type="text" placeholder="Search clients by name, PAN, group..." class="pl-10 pr-4 py-2.5 w-full text-[15px] rounded-xl border border-gray-200 bg-white focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                            </div>
                            <div class="flex items-center gap-2 w-full sm:w-auto">
                                <button @click="openExportModal('clients')" class="px-4 py-2.5 font-semibold border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl transition flex items-center justify-center gap-2 shadow-sm whitespace-nowrap text-[15px] flex-1 sm:flex-none">
                                    <i class="fa-solid fa-file-export"></i> Export
                                </button>
                                <button v-if="can('manage_clients')" @click="openImportModal('clients')" class="px-4 py-2.5 font-semibold border border-gray-300 text-gray-700 hover:bg-gray-100 rounded-xl transition flex items-center justify-center gap-2 shadow-sm whitespace-nowrap text-[15px] flex-1 sm:flex-none">
                                    <i class="fa-solid fa-file-import"></i> Bulk Upload
                                </button>
                                <button v-if="can('manage_clients')" @click="openClientModal" class="px-5 py-2.5 font-semibold bg-primary hover:bg-primary-hover text-white rounded-xl transition flex items-center justify-center gap-2 shadow-sm whitespace-nowrap text-[15px] flex-1 sm:flex-none">
                                    <i class="fa-solid fa-plus"></i> Add Client
                                </button>
                            </div>
                        </div>

                        <!-- Clients Card Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 animate-fade-in">
                            <div v-for="client in paginatedClients" :key="client.id" class="app-card p-3.5 flex flex-col gap-3">
                                <div class="flex items-start justify-between">
                                    <div class="flex items-center gap-3 min-w-0">
                                        <div class="w-11 h-11 rounded-full text-white font-semibold flex items-center justify-center uppercase text-[17px] shrink-0" style="background: linear-gradient(160deg, var(--color-accent), var(--color-primary));">{{ client.name ? client.name[0] : '?' }}</div>
                                        <div class="min-w-0">
                                            <div class="flex items-center gap-2 flex-wrap">
                                                <div class="font-semibold text-[16px] text-gray-800 leading-tight truncate">{{ client.name }}</div>
                                                <span v-if="client.custom_id" class="font-mono text-[11.5px] text-gray-500 bg-gray-100 border border-gray-200 px-1.5 py-0.5 rounded">{{ client.custom_id }}</span>
                                            </div>
                                            <span class="inline-block mt-1 bg-accent-light text-accent px-2 py-0.5 rounded-md text-[12px] font-semibold">{{ client.group_name || 'Individual' }}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-1 shrink-0">
                                        <button v-if="can('manage_clients')" @click="startEditClient(client)" class="text-gray-400 hover:text-accent hover:bg-accent-light p-1.5 rounded-lg transition" title="Edit client"><i class="fa-solid fa-pen text-[13px]"></i></button>
                                        <button v-if="can('delete_client')" @click="deleteClient(client)" class="text-gray-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded-lg transition" title="Delete client"><i class="fa-solid fa-trash-can text-[13px]"></i></button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-[13.5px] border-t border-gray-100 pt-4">
                                    <div><span class="text-gray-400 font-semibold text-[11px] uppercase tracking-wide block mb-0.5">Entity</span><span class="text-gray-700 font-medium">{{ client.entity_type }}</span></div>
                                    <div><span class="text-gray-400 font-semibold text-[11px] uppercase tracking-wide block mb-0.5">PAN</span><span class="text-gray-700 font-mono font-semibold uppercase">{{ client.pan }}</span></div>
                                    <div><span class="text-gray-400 font-semibold text-[11px] uppercase tracking-wide block mb-0.5">GSTIN</span><span class="text-gray-700 font-mono uppercase">{{ client.gstin || 'N/A' }}</span></div>
                                    <div><span class="text-gray-400 font-semibold text-[11px] uppercase tracking-wide block mb-0.5">Cabinet</span><span class="text-gray-700"><i class="fa-solid fa-folder-open text-amber-500 mr-1"></i>{{ client.physical_folder_location }}</span></div>
                                </div>
                                <div class="flex items-center gap-2 border-t border-gray-100 pt-4">
                                    <button @click="openContactsForClient(client)" class="flex-1 px-3 py-2 bg-accent-light text-accent hover:bg-accent hover:text-white rounded-lg text-[13.5px] font-semibold transition inline-flex items-center justify-center gap-1.5"><i class="fa-solid fa-address-book"></i> Contacts</button>
                                    <button @click="openVaultForClient(client)" class="flex-1 px-3 py-2 bg-gray-800 hover:bg-black text-white rounded-lg text-[13.5px] font-semibold transition inline-flex items-center justify-center gap-1.5"><i class="fa-solid fa-key text-[12px]"></i> Vault</button>
                                </div>
                            </div>
                            <div v-if="filteredClients.length === 0" class="col-span-full text-center py-14 text-gray-400 italic app-card">No clients yet.</div>
                        </div>

                        <!-- Pagination -->
                        <div v-if="filteredClients.length > clientsPerPage" class="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <span class="text-[13px] text-gray-500 font-medium">
                                Showing <span class="font-semibold text-gray-700">{{ (clientPage - 1) * clientsPerPage + 1 }}</span> to
                                <span class="font-semibold text-gray-700">{{ Math.min(clientPage * clientsPerPage, filteredClients.length) }}</span> of
                                <span class="font-semibold text-gray-700">{{ filteredClients.length }}</span> clients
                            </span>
                            <div class="flex items-center gap-1.5" v-if="totalClientPages > 1">
                                <button @click="clientPage = Math.max(1, clientPage - 1)" :disabled="clientPage === 1" class="px-3.5 py-1.5 rounded-lg text-[13px] font-semibold transition" :class="clientPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'"><i class="fa-solid fa-angle-left mr-1"></i> Prev</button>
                                <button v-for="p in totalClientPages" :key="p" @click="clientPage = p" class="w-9 h-9 rounded-lg text-[13px] font-semibold transition" :class="clientPage === p ? 'bg-primary text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100'">{{ p }}</button>
                                <button @click="clientPage = Math.min(totalClientPages, clientPage + 1)" :disabled="clientPage === totalClientPages" class="px-3.5 py-1.5 rounded-lg text-[13px] font-semibold transition" :class="clientPage === totalClientPages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'">Next <i class="fa-solid fa-angle-right ml-1"></i></button>
                            </div>
                        </div>
                    </main>

                    <!-- 4. SERVICES CATALOG TAB -->
                    <main v-if="currentTab === 'services'" class="p-8 space-y-6 max-w-7xl mx-auto">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">Compliance Services Catalog</h3>
                                <p class="text-xs text-gray-500 mt-0.5">Manage custom operational services and launch structured compliance tasks immediately.</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button @click="openExportModal('services')" class="px-4 py-2 border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl font-semibold text-sm shadow-sm transition flex items-center gap-1.5">
                                    <i class="fa-solid fa-file-export"></i> Export
                                </button>
                                <button v-if="can('manage_services')" @click="openImportModal('services')" class="px-4 py-2 border border-gray-300 text-gray-700 hover:bg-gray-100 rounded-xl font-semibold text-sm shadow-sm transition flex items-center gap-1.5">
                                    <i class="fa-solid fa-file-import"></i> Bulk Upload
                                </button>
                                <button v-if="can('manage_services')" @click="openServiceModal" class="px-4 py-2 bg-primary hover:bg-primary-hover text-white rounded-xl font-semibold text-sm shadow transition flex items-center gap-1.5">
                                    <i class="fa-solid fa-folder-plus text-xs"></i> Create Service
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 animate-fade-in">
                            <div v-for="srv in services" :key="srv.id" class="bg-white rounded-2xl shadow-sm border border-gray-150 p-4 flex flex-col justify-between hover:shadow-md transition duration-300 relative overflow-hidden group border-t-4 border-accent">
                                <div>
                                    <div class="flex justify-between items-start mb-3">
                                        <h4 class="text-base font-bold text-gray-850 truncate max-w-xs leading-snug flex items-center gap-1.5">
                                            <button v-if="can('manage_services')" @click="startEditService(srv)" class="text-xs text-accent hover:text-accent-hover hover:bg-accent-light p-1 rounded-lg transition" title="Edit Service details">
                                                <i class="fa-solid fa-pen"></i>
                                            </button>
                                            <span>{{ srv.name }}</span>
                                        </h4>
                                        <div class="flex flex-col items-end gap-1">
                                            <span v-if="srv.custom_id" class="font-mono text-[10px] text-gray-500 bg-gray-100 border border-gray-200 px-1.5 py-0.5 rounded">{{ srv.custom_id }}</span>
                                            <span class="bg-accent-light border border-accent/20 text-accent px-2 py-0.5 rounded text-[10px] font-bold">Catalog</span>
                                            <span class="text-[9px] text-gray-400 font-mono">Due Day: <strong class="text-accent">{{ srv.default_due_day || 15 }}</strong></span>
                                        </div>
                                    </div>
                                    <p class="text-xs text-gray-500 leading-relaxed font-medium mb-4">{{ srv.description || 'No description notes.' }}</p>
                                    
                                    <!-- Checklist items display -->
                                    <div class="space-y-2 border-t pt-4 mb-5">
                                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block"><i class="fa-solid fa-list-check mr-1 text-primary"></i> Checklist steps</span>
                                        <div class="flex flex-wrap gap-1.5">
                                            <span v-for="item in parseChecklist(srv.checklist_json)" :key="item" class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-lg text-[10px] font-semibold">
                                                {{ item }}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Launch single task shortcut for this template (Admin only) -->
                                <div class="border-t pt-3 flex justify-end">
                                    <button v-if="can('create_task')" @click="launchTaskFromService(srv)" class="px-4 py-2 bg-accent-light hover:bg-accent text-accent hover:text-white border border-accent/25 rounded-xl text-xs font-bold transition flex items-center gap-1.5 shadow-sm">
                                        <i class="fa-solid fa-bolt text-[10px]"></i> Launch Task
                                    </button>
                                    <span v-else class="text-[10px] text-gray-400 italic font-medium"><i class="fa-solid fa-check mr-1 text-green-500"></i> Catalog Verified</span>
                                </div>
                            </div>
                        </div>
                    </main>

                    <!-- 5. USERS TAB (manage_users) -->
                    <main v-if="currentTab === 'users' && can('manage_users')" class="p-8 space-y-6 max-w-5xl mx-auto">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">Firm Personnel Directory</h3>
                                <p class="text-xs text-gray-500 mt-0.5">Manage personnel accounts, user names, and operational roles for access control.</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button @click="openExportModal('users')" class="px-4 py-2 border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl font-semibold text-sm shadow-sm transition flex items-center gap-1.5">
                                    <i class="fa-solid fa-file-export"></i> Export
                                </button>
                                <button @click="openImportModal('users')" class="px-4 py-2 border border-gray-300 text-gray-700 hover:bg-gray-100 rounded-xl font-semibold text-sm shadow-sm transition flex items-center gap-1.5">
                                    <i class="fa-solid fa-file-import"></i> Bulk Upload
                                </button>
                                <button @click="openUserModal()" class="px-4 py-2 bg-primary hover:bg-blue-800 text-white rounded-xl font-semibold text-sm shadow transition flex items-center gap-1">
                                    <i class="fa-solid fa-plus text-xs"></i> Add Staff
                                </button>
                            </div>
                        </div>

                        <!-- Staff Directory List -->
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-150 overflow-hidden">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs font-bold uppercase tracking-wider">
                                        <th class="py-3.5 px-6">Full Name</th>

                                        <th class="py-3.5 px-6">Access Role</th>
                                        <th class="py-3.5 px-6 text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50 text-sm">
                                    <tr v-for="usr in usersList" :key="usr.id" class="hover:bg-gray-50/50 transition animate-fade-in">

                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">To</label>
                                <input v-model="clearTo" type="date" class="w-full rounded-xl border border-gray-200 p-2.5 text-sm">
                            </div>
                        </div>
                        <p class="text-xs text-gray-500">Both dates are inclusive. To clear everything, pick a wide range (e.g. from your firm's start date to today).</p>
                        <div v-if="clearLogError" class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 text-sm"><i class="fa-solid fa-circle-exclamation mr-1.5"></i>{{ clearLogError }}</div>
                    </div>
                    <div class="flex justify-end gap-2 px-6 py-4 border-t bg-gray-50/50">
                        <button @click="closeClearLogModal" class="px-4 py-2 text-sm font-semibold text-gray-500 hover:bg-gray-100 rounded-lg">Cancel</button>
                        <button @click="confirmClearLog" :disabled="clearLogBusy" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition shadow disabled:opacity-50 flex items-center gap-2">
                            <i class="fa-solid" :class="clearLogBusy ? 'fa-spinner fa-spin' : 'fa-trash-can'"></i>
                            {{ clearLogBusy ? 'Clearing…' : 'Clear Entries' }}
                        </button>
                    </div>
                </div>
            </div>

            <!-- MODAL: RECURRING TEMPLATES -->
            <div v-if="showRecurringModal && can('create_task')" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100 overflow-hidden max-h-[90vh] flex flex-col">
                    <div class="bg-primary text-white px-6 py-4 flex items-center justify-between shrink-0">
                        <h4 class="text-base font-bold flex items-center gap-2"><i class="fa-solid fa-repeat"></i> Recurring Tasks</h4>
                        <button @click="closeRecurringModal" class="text-white/80 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    <div class="p-6 flex-1 overflow-y-auto">
                        <p class="text-[13px] text-gray-500 mb-4">Each template auto-creates its tasks on the 3rd of every due month (due the 10th). Change the staff member for future months, or pause a template.</p>
                        <div v-if="recurringTemplates.length" class="border border-gray-150 rounded-xl divide-y divide-gray-50">
                            <div v-for="tpl in recurringTemplates" :key="tpl.id" class="flex flex-wrap items-center justify-between gap-3 px-4 py-3" :class="tpl.active ? '' : 'opacity-50'">
                                <div class="min-w-0">
                                    <div class="text-[14px] font-semibold text-gray-800 truncate">{{ tpl.client_name }} · {{ tpl.service_name }}</div>
                                    <div class="text-[12px] text-gray-400">{{ freqLabel(tpl.frequency) }} · FY {{ tpl.financial_year }}</div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select :value="tpl.assigned_to || ''" @change="updateRecurringTpl(tpl, { assigned_to: $event.target.value || null })" class="rounded-lg border border-gray-200 px-2.5 py-1.5 text-[13px] bg-white cursor-pointer" :disabled="!tpl.active">
                                        <option value="">— Unassigned —</option>
                                        <option v-for="u in usersList" :key="u.id" :value="u.id">{{ u.full_name }}</option>
                                    </select>
                                    <button @click="updateRecurringTpl(tpl, { active: tpl.active ? 0 : 1 })" class="px-3 py-1.5 rounded-lg text-[12.5px] font-semibold transition" :class="tpl.active ? 'border border-red-200 text-red-600 hover:bg-red-50' : 'border border-emerald-200 text-emerald-600 hover:bg-emerald-50'">
                                        {{ tpl.active ? 'Pause' : 'Resume' }}
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div v-else class="text-center py-12 text-gray-400 italic text-[14px]">No recurring templates yet. Create a task with a recurring plan to add one.</div>
                    </div>
                    <div class="flex justify-end px-6 py-4 border-t bg-gray-50/50 shrink-0">
                        <button @click="closeRecurringModal" class="px-4 py-2 text-sm font-semibold text-gray-500 hover:bg-gray-100 rounded-lg">Close</button>
                    </div>
                </div>
            </div>

            <!-- MODAL: DELETE STAFF (with mandatory task reassignment) -->
            <div v-if="showDeleteUserModal && deleteUserTarget" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-md border border-gray-100 overflow-hidden">
                    <div class="bg-red-600 text-white px-6 py-4 flex items-center justify-between">
                        <h4 class="text-base font-bold flex items-center gap-2"><i class="fa-solid fa-user-xmark"></i> Delete Staff</h4>
                        <button @click="closeDeleteUser" class="text-white/80 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    <div class="p-6 space-y-4">
                        <p class="text-sm text-gray-600">You're about to delete <span class="font-semibold text-gray-800">{{ deleteUserTarget.full_name }}</span> <span class="text-gray-400">({{ deleteUserTarget.role }})</span>.</p>
                        <div v-if="deleteUserTaskCount > 0" class="space-y-2">
                            <div class="bg-amber-50 border border-amber-200 text-amber-800 rounded-xl p-3 text-sm">
                                <i class="fa-solid fa-triangle-exclamation mr-1.5"></i>This person still has <strong>{{ deleteUserTaskCount }}</strong> task(s). Reassign them before deleting.
                            </div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Reassign all their tasks to</label>
                            <select v-model="deleteReassignTo" class="w-full rounded-xl border border-gray-200 p-2.5 text-sm bg-white">
                                <option value="">Select a staff member…</option>
                                <option v-for="u in reassignCandidates" :key="u.id" :value="u.id">{{ u.full_name }} ({{ u.role }})</option>
                            </select>
                        </div>
                        <p v-else class="text-sm text-gray-500">This person has no tasks assigned, so they can be deleted directly.</p>
                        <div v-if="deleteUserError" class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 text-sm"><i class="fa-solid fa-circle-exclamation mr-1.5"></i>{{ deleteUserError }}</div>
                    </div>
                    <div class="flex justify-end gap-2 px-6 py-4 border-t bg-gray-50/50">
                        <button @click="closeDeleteUser" class="px-4 py-2 text-sm font-semibold text-gray-500 hover:bg-gray-100 rounded-lg">Cancel</button>
                        <button @click="confirmDeleteUser" :disabled="deleteUserBusy" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition shadow disabled:opacity-50 flex items-center gap-2">
                            <i class="fa-solid" :class="deleteUserBusy ? 'fa-spinner fa-spin' : 'fa-user-xmark'"></i>
                            {{ deleteUserBusy ? 'Deleting…' : 'Delete Staff' }}
                        </button>
                    </div>
                </div>
            </div>

            <!-- MODAL: BILL TASK (Completed -> Billed) -->
            <div v-if="showBillingModal && billingTask" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-md border border-gray-100 overflow-hidden">
                    <div class="bg-emerald-600 text-white px-6 py-4 flex items-center justify-between">
                        <h4 class="text-base font-bold flex items-center gap-2"><i class="fa-solid fa-file-invoice-dollar"></i> Bill Task</h4>
                        <button @click="closeBillingModal" class="text-white/80 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    <div class="p-6 space-y-4">
                        <p class="text-sm text-gray-600"><span class="font-semibold text-gray-800">{{ billingTask.client_name }} · {{ billingTask.service_name }}</span> <span class="text-gray-400">({{ billingTask.financial_year }} · {{ billingTask.period }})</span></p>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Bill this task?</label>
                            <div class="grid grid-cols-2 gap-3">
                                <button type="button" @click="billingDecision='Yes'" :class="billingDecision==='Yes' ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 text-gray-600 hover:bg-gray-50'" class="px-4 py-2.5 rounded-xl border-2 font-semibold text-sm transition">Yes</button>
                                <button type="button" @click="billingDecision='No'" :class="billingDecision==='No' ? 'border-gray-400 bg-gray-100 text-gray-700' : 'border-gray-200 text-gray-600 hover:bg-gray-50'" class="px-4 py-2.5 rounded-xl border-2 font-semibold text-sm transition">No</button>
                            </div>
                        </div>
                        <template v-if="billingDecision==='Yes'">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Billed Amount <span class="text-red-500">*</span></label>
                                <input v-model="billedAmount" type="number" min="0" step="0.01" placeholder="0.00" class="w-full rounded-xl border border-gray-200 p-2.5 text-sm font-mono">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">GST Amount <span class="text-gray-400 normal-case font-medium">(optional, default 0)</span></label>
                                <input v-model="gstAmount" type="number" min="0" step="0.01" placeholder="0.00" class="w-full rounded-xl border border-gray-200 p-2.5 text-sm font-mono">
                            </div>
                            <div class="bg-gray-50 border border-gray-150 rounded-xl p-3.5 flex items-center justify-between">
                                <span class="text-sm font-semibold text-gray-600">Total Amount</span>
                                <span class="text-lg font-bold text-emerald-700">{{ fmtMoney(billingTotal) }}</span>
                            </div>
                        </template>
                        <p v-else-if="billingDecision==='No'" class="text-sm text-gray-500 bg-gray-50 border border-gray-150 rounded-xl p-3">Select <strong>Yes</strong> to enter the billing amounts and move this task to Billed.</p>
                        <div v-if="billingError" class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 text-sm"><i class="fa-solid fa-circle-exclamation mr-1.5"></i>{{ billingError }}</div>
                    </div>
                    <div class="flex justify-end gap-2 px-6 py-4 border-t bg-gray-50/50">
                        <button @click="closeBillingModal" class="px-4 py-2 text-sm font-semibold text-gray-500 hover:bg-gray-100 rounded-lg">Cancel</button>
                        <button @click="confirmBilling" :disabled="!billingReady || billingBusy" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-semibold transition shadow disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                            <i class="fa-solid" :class="billingBusy ? 'fa-spinner fa-spin' : 'fa-arrow-right'"></i>
                            {{ billingBusy ? 'Saving…' : 'Move to Billed' }}
                        </button>
                    </div>
                </div>
            </div>
        </template>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
